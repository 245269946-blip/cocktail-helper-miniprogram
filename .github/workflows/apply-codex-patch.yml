name: Apply Codex patch

on:
  push:
    paths:
      - codex-update.patch.gz.b64
      - .github/workflows/apply-codex-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch
        run: |
          base64 -d codex-update.patch.gz.b64 | gzip -d > /tmp/codex-update.patch
          git apply --binary /tmp/codex-update.patch
      - name: Commit result
        run: |
          rm -f codex-update.patch.gz.b64
          rm -f .github/workflows/apply-codex-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Apply summer night drink lab visual system"
          git push
